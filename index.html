<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>snake game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section>
            <div class="infos">
                <div>
                    <h3>Score:<span id="score">0</span></h3>
                </div>
                <div>
                    <h3>High-Score:<span id="high-score">
                        0
                    </span></h3>
                </div>
                <div >
                    <h3>Time:<span id="time">00-00</span></h3>
                </div>
            </div>
            <div class="board">
            </div>
        </section>
        <div class="modal">
            <div class="start-game">
                <h3>welcome to snake game</h3>
                <button class="btn start-btn">start game</button>
            </div>
            <div class="restart-game">
                <h3>Game over</h3>
                <button class="btn restart-btn">restart game</button>
            </div>
        </div>
    </main>


    <script src="app.js"></script>
</body>
</html>
